# docker-compose.yml — site web "WhatsApp scheduler"
#
# ╔═══════════════════════════════════════════════════════════════════════╗
# ║  À copier tel quel sur le NAS — pas besoin de cloner le repo.        ║
# ║  Le dossier de travail recommandé est /volume2/docker/whatsapp-      ║
# ║  scheduler/ — y mettre ce fichier + .env.production.                 ║
# ║                                                                       ║
# ║    /volume2/docker/whatsapp-scheduler/                               ║
# ║    ├── docker-compose.yml                                            ║
# ║    ├── .env.production                                               ║
# ║    └── data/                  ← créé automatiquement                ║
# ║        ├── app.db             ← SQLite (users, modèles, audit)      ║
# ║        └── uploads/           ← pièces jointes                       ║
# ╚═══════════════════════════════════════════════════════════════════════╝
#
# Premier lancement :
#   cd /volume2/docker/whatsapp-scheduler
#   mkdir -p data && sudo chown -R 1001:1001 data    # 1001 = uid du user `app` dans l'image
#   docker compose up -d
#
# Update (après git push + Actions ✅) :
#   docker compose pull && docker compose up -d

services:
  web:
    # Image construite par GitHub Actions à chaque push sur `main`.
    # Tag `latest` = dernière version de la branche par défaut.
    # Pour pinner / rollback : remplace `latest` par `sha-abc1234` (cf. ghcr.io).
    image: ghcr.io/youmeric/whatsapp-scheduler-web:latest
    container_name: whatsapp-scheduler-web
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${HOST_PORT:-4000}:4000"
    env_file:
      - ./.env.production
    environment:
      - TZ=Europe/Paris
    volumes:
      # Bind mount : la DB SQLite et les pièces jointes vivent sur le NAS,
      # accessibles directement via le filesystem (pratique pour backup et
      # pour survivre à une suppression du container Docker).
      - ./data:/app/data
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:4000/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────── (optionnel) Watchtower ─────────────────────────
  # Décommente pour que le NAS pull et redémarre automatiquement quand une
  # nouvelle image est dispo sur ghcr.io.
