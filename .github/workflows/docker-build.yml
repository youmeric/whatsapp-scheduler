# Build l'image Docker du site web et la pousse vers GitHub Container Registry
# (ghcr.io) à chaque push sur `main`. Le NAS pull l'image depuis ghcr.io.
#
# Tags produits :
#   - `latest`               → toujours le dernier `main`
#   - `sha-<7chars>`         → image immuable de ce commit (utile pour rollback)
#
# Le NAS pull `latest`. Pour rollback, change l'image du compose en `sha-abc1234`.

name: Build & push Docker image

on:
  push:
    branches: [main]
    # Ne re-build pas si on ne touche que des docs / secrets / fichiers locaux.
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".vscode/**"
      - ".claude/**"
      - "DEPLOY.md"
  workflow_dispatch: # Bouton "Run workflow" manuel dans l'UI GitHub

# Pas plus d'un build à la fois sur la même branche — annule le précédent
# si on push deux fois rapidement.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # nécessaire pour pousser vers ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image name: ghcr.io/<owner>/<repo>-web — owner/repo proviennent
          # automatiquement du repo qui héberge ce workflow.
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
